<!-- 显示访问量的区域 -->
<div style="text-align: center; font-size: 14px; color: #666; padding: 10px;">
    访问量：<span id="cf-umami-views">加载中...</span>
</div>

<script>
(function() {
    var viewsSpan = document.getElementById('cf-umami-views');
    if (!viewsSpan) return;

    function fetchViews() {
        var path = location.pathname;
        // 使用 HTTPS 并添加时间戳防止缓存（可选）
        var shareUrl = 'https://cf-umami.qwc.cc.cd/share?pathname=' + encodeURIComponent(path) + '&t=' + Date.now();

        fetch(shareUrl, {
            method: 'GET',
            mode: 'cors',
            credentials: 'omit'
        })
        .then(function(res) {
            if (!res.ok) {
                throw new Error('HTTP ' + res.status);
            }
            return res.json();
        })
        .then(function(data) {
            var views = data.views;
            if (typeof views === 'number') {
                viewsSpan.textContent = views.toLocaleString();
            } else {
                viewsSpan.textContent = '无数据';
            }
        })
        .catch(function(err) {
            console.error('获取访问量失败:', err);
            viewsSpan.textContent = '获取失败';
            // 可以在这里显示更详细的错误信息（调试用）
            // viewsSpan.textContent = '失败: ' + err.message;
        });
    }

    // 页面加载时获取一次
    fetchViews();
})();
</script>
