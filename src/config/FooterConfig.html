<!-- 不蒜子统计显示 - 完整版 -->
<div style="text-align: center; font-size: 14px; color: #666; margin-top: 10px;">
  本站总访问量：<span id="busuanzi_value_site_pv">-</span> 次
</div>

<!-- 加载不蒜子核心脚本（异步） -->
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.min.js"></script>

<!-- 确保不蒜子在 Astro 页面切换后也能刷新 -->
<script>
  (function() {
    // 手动刷新不蒜子显示的函数
    function refreshBusuanzi() {
      if (typeof window.busuanzi !== 'undefined') {
        // 不蒜子暴露的 fetch 方法会重新获取数据并更新页面
        window.busuanzi.fetch();
      } else {
        // 如果脚本还没加载，等待它加载完成后再尝试
        var checkInterval = setInterval(function() {
          if (typeof window.busuanzi !== 'undefined') {
            clearInterval(checkInterval);
            window.busuanzi.fetch();
          }
        }, 200);
        // 5秒后停止检查，避免无限循环
        setTimeout(function() { clearInterval(checkInterval); }, 5000);
      }
    }

    // 监听 Astro 的页面切换事件（如果存在）
    if (document.addEventListener) {
      document.addEventListener('astro:page-load', refreshBusuanzi);
    }

    // 页面初始加载时刷新一次（确保首次显示）
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', refreshBusuanzi);
    } else {
      refreshBusuanzi();
    }
  })();
</script>
