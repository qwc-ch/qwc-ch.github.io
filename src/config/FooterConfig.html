<!-- 在页脚显示当前页面的访问量 -->
<div style="text-align: center; font-size: 14px; color: #666; padding: 10px;">
    访问量：<span id="cf-umami-views">加载中...</span>
</div>
<script>
(function() {
    var viewsSpan = document.getElementById('cf-umami-views');
    if (!viewsSpan) return;

    // 获取当前页面路径（不含域名和参数）
    var path = location.pathname;
    // cf-umami 提供的公开分享接口
    var shareUrl = 'https://cf-umami.qwc.cc.cd/share?pathname=' + encodeURIComponent(path);

    fetch(shareUrl, {
        method: 'GET',
        mode: 'cors',
        credentials: 'omit'
    })
    .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    })
    .then(function(data) {
        // 接口返回格式类似: { "pathname": "/xxx", "views": 12345 }
        var views = data.views;
        if (typeof views === 'number') {
            viewsSpan.textContent = views.toLocaleString(); // 格式化数字（如 56,692）
        } else {
            viewsSpan.textContent = '暂无数据';
        }
    })
    .catch(function(err) {
        console.warn('获取访问量失败:', err);
        viewsSpan.textContent = '获取失败';
    });
})();
</script>
