name = "firefly"
compatibility_date = "2026-04-24" # 更为今日

[assets]
directory = "./dist"

[vars]
NODE_VERSION = "24"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
